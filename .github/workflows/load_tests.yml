name: HistoQuanta Load Testing

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]
  workflow_dispatch:

jobs:
  load-test:
    name: 📊 Load Testing — Performance (300)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Node dependencies
        run: |
          cd "Histoquanta 2/web"
          npm ci || npm install

      - name: Start HistoQuanta server
        run: |
          php -S 127.0.0.1:8000 -t "Histoquanta 2/backend" &
          cd "Histoquanta 2/web"
          npm run dev &

      - name: Wait for server ready
        run: |
          npx wait-on http://127.0.0.1:8000 --timeout 15000
          npx wait-on http://127.0.0.1:3000 --timeout 60000

      - name: Run Load Testing Suite (Fast CI Mode)
        env:
          TARGET_URL: http://127.0.0.1:3000
          GITHUB_STEP_SUMMARY: ${{ github.step_summary }}
        run: |
          pip install aiohttp
          cd "Histoquanta 2"
          python load_tests/run_load_test.py

      - name: Upload Load CSV Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Load-CSV-Report
          path: "Histoquanta 2/load_report.csv"

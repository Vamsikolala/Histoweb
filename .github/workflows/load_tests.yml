name: HistoQuanta Load Testing

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]
  workflow_dispatch:

jobs:
  load-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Frontend Dependencies
        run: |
          cd "Histoquanta 2/web"
          npm ci || npm install

      - name: Start Vite Frontend Server
        run: |
          cd "Histoquanta 2/web"
          npm run dev &
          # Wait for the Vite dev server to start on port 3000
          npx wait-on http://localhost:3000 --timeout 60000

      - name: Run k6 Load Test
        uses: grafana/k6-action@v0.3.1
        with:
          filename: "Histoquanta 2/k6_load_test.js"
          flags: --env TARGET_URL=http://localhost:3000

name: HistoQuanta Test Suite

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]
  workflow_dispatch:

jobs:
  test-report:
    name: 🌐 Selenium — Website Tests (132)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install -r "Histoquanta 2/e2e_tests/requirements.txt"

      - name: Run E2E Tests & Generate Reports
        env:
          CI: 'true'
        run: |
          cd "Histoquanta 2"
          python e2e_tests/run_tests.py

      - name: Upload Excel Test Report
        uses: actions/upload-artifact@v4
        with:
          name: Selenium-Excel-Test-Report
          path: Histoquanta 2/e2e_tests/E2E_Test_Report_HistoQuanta_*.xlsx

      - name: Generate Test Summary Report
        env:
          GITHUB_STEP_SUMMARY: ${{ github.step_summary }}
        run: |
          cd "Histoquanta 2"
          python e2e_tests/generate_summary.py

  mobile-test-report:
    name: 📱 Appium — iOS Tests (20)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install -r "Histoquanta 2/appium_tests/requirements.txt"

      - name: Run Appium Tests & Generate Reports
        env:
          CI: 'true'
        run: |
          cd "Histoquanta 2"
          python appium_tests/run_tests.py

      - name: Upload Excel Test Report
        uses: actions/upload-artifact@v4
        with:
          name: Appium-Excel-Test-Report
          path: Histoquanta 2/appium_tests/Appium_Test_Report_HistoQuanta_*.xlsx

      - name: Generate Appium Test Summary Report
        env:
          GITHUB_STEP_SUMMARY: ${{ github.step_summary }}
        run: |
          cd "Histoquanta 2"
          python appium_tests/generate_summary.py

  load-test:
    name: 📊 Load Testing — Performance (300)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Node dependencies
        run: |
          cd "Histoquanta 2/web"
          npm ci || npm install

      - name: Setup Database
        run: |
          sudo systemctl start mysql.service
          mysql -uroot -proot -e "CREATE DATABASE IF NOT EXISTS histoquanta; ALTER USER 'root'@'localhost' IDENTIFIED WITH mysql_native_password BY ''; FLUSH PRIVILEGES;"
          mysql -u root histoquanta < histoquanta.sql

      - name: Start HistoQuanta server
        run: |
          php -S 127.0.0.1:8000 -t "Histoquanta 2/backend" &
          cd "Histoquanta 2/web"
          npm run dev &

      - name: Wait for server ready
        run: |
          npx wait-on http://127.0.0.1:8000 --timeout 15000
          npx wait-on http://127.0.0.1:3000 --timeout 60000

      - name: Run Load Testing Suite (Fast CI Mode)
        env:
          TARGET_URL: http://127.0.0.1:3000
          GITHUB_STEP_SUMMARY: ${{ github.step_summary }}
        run: |
          pip install aiohttp
          cd "Histoquanta 2"
          python load_tests/run_load_test.py

      - name: Upload Load CSV Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Load-CSV-Report
          path: "Histoquanta 2/load_report.csv"

  security-scan:
    name: 🛡️ OWASP ZAP — Vulnerability Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Node dependencies
        run: |
          cd "Histoquanta 2/web"
          npm ci || npm install

      - name: Setup Database
        run: |
          sudo systemctl start mysql.service
          mysql -uroot -proot -e "CREATE DATABASE IF NOT EXISTS histoquanta; ALTER USER 'root'@'localhost' IDENTIFIED WITH mysql_native_password BY ''; FLUSH PRIVILEGES;"
          mysql -u root histoquanta < histoquanta.sql

      - name: Start HistoQuanta server
        run: |
          php -S 127.0.0.1:8000 -t "Histoquanta 2/backend" &
          cd "Histoquanta 2/web"
          npm run dev &

      - name: Wait for server ready
        run: |
          npx wait-on http://127.0.0.1:8000 --timeout 15000
          npx wait-on http://127.0.0.1:3000 --timeout 60000

      - name: OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          target: 'http://127.0.0.1:3000'
          rules_file_name: '.zap/rules.tsv'
          create_issue: false
          fail_action: false


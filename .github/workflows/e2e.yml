name: HistoQuanta Test Suite

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]
  workflow_dispatch:

jobs:
  test-report:
    name: 🌐 Selenium — Website Tests (132)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install -r "Histoquanta 2/e2e_tests/requirements.txt"

      - name: Run E2E Tests & Generate Reports
        env:
          CI: 'true'
        run: |
          cd "Histoquanta 2"
          python e2e_tests/run_tests.py

      - name: Upload Excel Test Report
        uses: actions/upload-artifact@v4
        with:
          name: Selenium-Excel-Test-Report
          path: Histoquanta 2/e2e_tests/E2E_Test_Report_HistoQuanta_*.xlsx

      - name: Generate Test Summary Report
        env:
          GITHUB_STEP_SUMMARY: ${{ github.step_summary }}
        run: |
          cd "Histoquanta 2"
          python e2e_tests/generate_summary.py

  mobile-test-report:
    name: 📱 Appium — iOS Tests (40)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Appium Test Dependencies
        run: |
          cd "automated-tests/appium"
          npm install

      - name: Verify Test Structure
        run: |
          echo "📱 Appium iOS Test Suite — Structure Verification"
          echo "================================================="
          echo ""
          echo "Test files:"
          ls -la "automated-tests/appium/tests/"
          echo ""
          echo "Configuration:"
          ls -la "automated-tests/appium/wdio.conf.js"
          echo ""
          echo "Helpers:"
          ls -la "automated-tests/appium/helpers/"

      - name: Count Test Cases
        run: |
          cd "automated-tests/appium"
          TOTAL=$(grep -r "it(" tests/ --include="*.test.js" | wc -l | tr -d ' ')
          SUITES=$(ls tests/*.test.js | wc -l | tr -d ' ')
          echo "📊 Found $TOTAL test cases across $SUITES test suites"

      - name: Generate Appium Test Summary
        run: |
          cd "automated-tests/appium"

          echo "## 📱 Appium iOS Test Suite Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Test Configuration" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Platform | iOS (XCUITest) |" >> $GITHUB_STEP_SUMMARY
          echo "| Framework | WebdriverIO + Mocha |" >> $GITHUB_STEP_SUMMARY
          echo "| Driver | appium-xcuitest-driver |" >> $GITHUB_STEP_SUMMARY
          echo "| Target Device | iPhone 15 Pro Simulator |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "### Test Suites" >> $GITHUB_STEP_SUMMARY
          echo "| Suite | File | Tests | Description |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|------|-------|-------------|" >> $GITHUB_STEP_SUMMARY

          for f in tests/*.test.js; do
            BASENAME=$(basename "$f")
            SUITE=$(echo "$BASENAME" | sed 's/.test.js//')
            COUNT=$(grep -c "it(" "$f" || echo 0)
            DESC=$(head -3 "$f" | grep -o '\*.*' | head -1 | sed 's/\* //')
            echo "| ${SUITE^} | \`$BASENAME\` | $COUNT | $DESC |" >> $GITHUB_STEP_SUMMARY
          done

          TOTAL=$(grep -r "it(" tests/ --include="*.test.js" | wc -l | tr -d ' ')
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Total: $TOTAL test cases**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "### Accessibility Identifiers Injected" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "The following SwiftUI views have \`.accessibilityIdentifier()\` modifiers for Appium element location:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| View | Identifiers |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------------|" >> $GITHUB_STEP_SUMMARY
          echo "| SplashView | \`splash-title\`, \`splash-subtitle\` |" >> $GITHUB_STEP_SUMMARY
          echo "| DoctorLoginView | \`login-license-field\`, \`login-password-field\`, \`login-submit-btn\`, \`login-signup-link\`, \`login-forgot-password-link\`, \`login-error-text\` |" >> $GITHUB_STEP_SUMMARY
          echo "| DoctorSignupView | \`signup-name-field\`, \`signup-license-field\`, \`signup-email-field\`, \`signup-password-field\`, \`signup-submit-btn\`, \`signup-error-text\`, \`signup-login-link\` |" >> $GITHUB_STEP_SUMMARY
          echo "| ForgotPasswordView | \`forgot-email-field\`, \`forgot-otp-field\`, \`forgot-new-password-field\`, \`forgot-confirm-password-field\`, \`forgot-submit-btn\`, \`forgot-back-btn\` |" >> $GITHUB_STEP_SUMMARY
          echo "| AddPatientView | \`ap-name-field\`, \`ap-age-field\`, \`ap-gender-picker\`, \`ap-phone-field\`, \`ap-address-field\`, \`ap-submit-btn\` |" >> $GITHUB_STEP_SUMMARY
          echo "| SearchPatientView | \`search-input\`, \`search-patient-card-*\` |" >> $GITHUB_STEP_SUMMARY
          echo "| PatientProfileView | \`patient-name-header\`, \`patient-edit-btn\`, \`patient-add-report-btn\` |" >> $GITHUB_STEP_SUMMARY
          echo "| DoctorProfileView | \`profile-doctor-name\`, \`profile-edit-btn\`, \`profile-privacy-btn\`, \`profile-terms-btn\`, \`profile-about-btn\`, \`profile-logout-btn\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "> **Note:** Full Appium test execution requires macOS with Xcode and iOS Simulator." >> $GITHUB_STEP_SUMMARY
          echo "> This CI job validates the test structure, counts test cases, and generates documentation." >> $GITHUB_STEP_SUMMARY
          echo "> For local execution, see \`automated-tests/appium/README.md\`." >> $GITHUB_STEP_SUMMARY

  load-test:
    name: 📊 Load Testing — Performance (300)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Node dependencies
        run: |
          cd "Histoquanta 2/web"
          npm ci || npm install

      - name: Setup Database
        run: |
          sudo systemctl start mysql.service
          mysql -uroot -proot -e "CREATE DATABASE IF NOT EXISTS histoquanta; ALTER USER 'root'@'localhost' IDENTIFIED WITH mysql_native_password BY ''; FLUSH PRIVILEGES;"
          mysql -u root histoquanta < histoquanta.sql

      - name: Start HistoQuanta server
        run: |
          php -S 127.0.0.1:8000 -t "Histoquanta 2/backend" &
          cd "Histoquanta 2/web"
          npm run dev &

      - name: Wait for server ready
        run: |
          npx wait-on http://127.0.0.1:8000 --timeout 15000
          npx wait-on http://127.0.0.1:3000 --timeout 60000

      - name: Run Load Testing Suite (Fast CI Mode)
        env:
          TARGET_URL: http://127.0.0.1:3000
          GITHUB_STEP_SUMMARY: ${{ github.step_summary }}
        run: |
          pip install aiohttp
          cd "Histoquanta 2"
          python load_tests/run_load_test.py

      - name: Upload Load CSV Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Load-CSV-Report
          path: "Histoquanta 2/load_report.csv"

  security-scan:
    name: 🛡️ OWASP ZAP — Vulnerability Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Node dependencies
        run: |
          cd "Histoquanta 2/web"
          npm ci || npm install

      - name: Setup Database
        run: |
          sudo systemctl start mysql.service
          mysql -uroot -proot -e "CREATE DATABASE IF NOT EXISTS histoquanta; ALTER USER 'root'@'localhost' IDENTIFIED WITH mysql_native_password BY ''; FLUSH PRIVILEGES;"
          mysql -u root histoquanta < histoquanta.sql

      - name: Start HistoQuanta server
        run: |
          php -S 127.0.0.1:8000 -t "Histoquanta 2/backend" &
          cd "Histoquanta 2/web"
          npm run dev &

      - name: Wait for server ready
        run: |
          npx wait-on http://127.0.0.1:8000 --timeout 15000
          npx wait-on http://127.0.0.1:3000 --timeout 60000

      - name: OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.15.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          target: 'http://127.0.0.1:3000'
          rules_file_name: '.zap/rules.tsv'
          allow_issue_writing: false
          artifact_name: 'zap-scan'
          fail_action: false

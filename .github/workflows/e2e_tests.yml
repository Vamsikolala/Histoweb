name: HistoQuanta Test Case Report

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  test-report:
    name: 🌐 Selenium — Website Tests (132)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install -r "Histoquanta 2/e2e_tests/requirements.txt"

      - name: Run E2E Tests & Generate Reports
        env:
          CI: 'true'
        run: |
          cd "Histoquanta 2"
          python e2e_tests/run_tests.py

      - name: Upload Excel Test Report
        uses: actions/upload-artifact@v4
        with:
          name: Selenium-Excel-Test-Report
          path: Histoquanta 2/e2e_tests/E2E_Test_Report_HistoQuanta_*.xlsx

      - name: Generate Test Summary Report
        env:
          GITHUB_STEP_SUMMARY: ${{ github.step_summary }}
        run: |
          cd "Histoquanta 2"
          python e2e_tests/generate_summary.py

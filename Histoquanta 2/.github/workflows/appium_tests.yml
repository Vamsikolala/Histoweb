name: HistoQuanta Mobile Appium Test Case Report

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  mobile-test-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install -r appium_tests/requirements.txt

      - name: Run Appium Tests & Generate Reports
        env:
          CI: 'true'
        run: |
          python appium_tests/run_tests.py

      - name: Upload Excel Test Report
        uses: actions/upload-artifact@v4
        with:
          name: Appium-Excel-Test-Report
          path: appium_tests/Appium_Test_Report_HistoQuanta_*.xlsx

      - name: Generate Appium Test Summary Report
        env:
          GITHUB_STEP_SUMMARY: ${{ github.step_summary }}
        run: |
          python appium_tests/generate_summary.py

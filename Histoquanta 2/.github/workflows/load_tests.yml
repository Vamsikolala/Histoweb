name: HistoQuanta Load Testing

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]
  workflow_dispatch:

jobs:
  load-test:
    name: 📊 Load Testing — Performance (300)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Frontend Dependencies
        run: |
          cd web
          npm ci || npm install

      - name: Install k6
        run: |
          curl -L -o k6.tar.gz https://github.com/grafana/k6/releases/download/v0.51.0/k6-v0.51.0-linux-amd64.tar.gz
          tar -xzf k6.tar.gz
          sudo mv k6-v0.51.0-linux-amd64/k6 /usr/local/bin/k6

      - name: Start Vite Frontend Server & Run k6 Load Test
        env:
          TARGET_URL: http://127.0.0.1:3000
        run: |
          cd web
          npm run dev &
          npx wait-on http://127.0.0.1:3000 --timeout 60000
          cd ..
          k6 run k6_load_test.js

      - name: Generate Load Test Summary Report
        if: always()
        env:
          GITHUB_STEP_SUMMARY: ${{ github.step_summary }}
        run: |
          python load_tests/generate_summary.py

      - name: Upload Load Test Text Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: K6-Load-Test-Report-TXT
          path: k6_report.txt
